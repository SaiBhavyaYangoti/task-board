services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 4100
      MONGO_URI: mongodb://mongo:27017/task-board
      JWT_SECRET: dev-secret-change-me
    ports:
      - "4100:4100"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4100/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5273:80"

volumes:
  mongo_data:
